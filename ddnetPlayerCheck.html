<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>DDNet 玩家在线检测</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
    }
    input {
        padding: 8px;
        width: 250px;
        font-size: 16px;
    }
    button {
        padding: 8px 12px;
        margin-left: 5px;
        font-size: 14px;
        cursor: pointer;
    }
    #result {
        margin-top: 20px;
        padding: 10px;
        background: white;
        border-radius: 6px;
    }
    .online {
        color: green;
        font-weight: bold;
    }
    .offline {
        color: red;
        font-weight: bold;
    }
</style>
</head>
<body>
<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<h2>DDNet 玩家在线检测</h2>

<textarea id="playerNames" placeholder="输入玩家名字，多名玩家用逗号或换行分隔" rows="4" cols="40"></textarea>
<button onclick="checkPlayers()">立即查询</button>
<button onclick="toggleAutoCheck()" id="autoBtn">开启自动查询</button>

<div id="result">等待查询...</div>
<br>
<label for="miaoma">喵提醒（喵码）输入在喵提醒公众号创建的喵码，如果查询到上线会把通知发送到微信</label>
<input id="miaoma" placeholder="输入喵码，如果不填不会触发">
<br>

<script>
let interval = null;
let lastStatuses = {}; // 存储上次在线状态，避免重复提示

if ("Notification" in window) {
    Notification.requestPermission();
}

async function checkPlayer() {
    const name = document.getElementById("playerName").value.trim();
    const resultDiv = document.getElementById("result");

    if (!name) {
        resultDiv.innerHTML = "请输入玩家名字";
        return;
    }

    resultDiv.innerHTML = "查询中...";

    try {
        const res = await fetch("https://master1.ddnet.org/ddnet/15/servers.json");
        const data = await res.json();

        let foundServers = [];

        for (const server of data.servers) {
            if (!server.info || !server.info.clients) continue;

            for (const client of server.info.clients) {
                if (client.name === name) {
                    foundServers.push(server.info.name);
                }
            }
        }

        if (foundServers.length > 0) {
            resultDiv.innerHTML = `
                <div class="online">在线 ✅</div>
                <div>所在服务器：</div>
                <ul>
                    ${foundServers.map(s => `<li>${s}</li>`).join("")}
                </ul>
                <div>更新时间：${new Date().toLocaleTimeString()}</div>
            `;
            document.getElementById("alertSound").play();
            if (Notification.permission === "granted") {
                new Notification("DDNet 玩家上线", {
                    body: name + " 已上线！",
                });
            }
            const btn = document.getElementById("autoBtn");
            clearInterval(interval);
            interval = null;
            btn.innerText = "开启自动查询";
        } else {
            resultDiv.innerHTML = `
                <div class="offline">离线 ❌</div>
                <div>更新时间：${new Date().toLocaleTimeString()}</div>
            `;
        }

    } catch (e) {
        resultDiv.innerHTML = "查询失败（可能被 CORS 限制）";
        console.error(e);
    }
}

function normalizeName(name) {
    return name.replace(/\^\d/g, "").replace(/\s+/g, " ").trim().toLowerCase();
}

async function checkPlayers() {
    const input = document.getElementById("playerNames").value.trim();
    const resultDiv = document.getElementById("result");
    if (!input) {
        resultDiv.innerHTML = "请输入至少一个玩家名字";
        return;
    }

    // 解析名字：逗号或换行分隔
    const names = input.split(/[\n,]+/).map(n => normalizeName(n));

    resultDiv.innerHTML = "查询中...";

    try {
        const res = await fetch("https://master1.ddnet.org/ddnet/15/servers.json");
        const data = await res.json();

        const results = names.map(n => ({ name: n, online: false, servers: [] }));

        for (const server of data.servers) {
            if (!server.info || !server.info.clients) continue;

            for (const client of server.info.clients) {
                const clientName = normalizeName(client.name);
                results.forEach(r => {
                    if (clientName.includes(r.name)) {
                        r.online = true;
                        r.servers.push(server.info.name);
                    }
                });
            }
        }
        console.log("查询结果", results);

        // 显示结果
        resultDiv.innerHTML = results.map(r => {
            if (r.online) {
                // 播放提示音 / 通知（只在状态变化时触发）
                if (!lastStatuses[r.name]) {
                    document.getElementById("alertSound")?.play().catch(()=>{});
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification("DDNet 玩家上线", { body: r.name + " 已上线！" });
                    }
                }
                    // 喵码触发
                const miaoma = document.getElementById("miaoma").value.trim();
                if (miaoma) {
                    fetch(`http://miaotixing.com/trigger?id=${miaoma}`)
                    .then(() => console.log("喵码触发成功:", miaoma))
                    .catch(err => console.log("喵码触发失败:", err));
                }
                lastStatuses[r.name] = true;
                const btn = document.getElementById("autoBtn");
                clearInterval(interval);
                interval = null;
                btn.innerText = "开启自动查询";
                return `<div class="online">${r.name} ✅ 在线，服务器：${r.servers.join(", ")}</div>`;
            } else {
                lastStatuses[r.name] = false;
                return `<div class="offline">${r.name} ❌ 离线</div>`;
            }
        }).join("");

    } catch (e) {
        console.error(e);
        resultDiv.innerHTML = "查询失败（可能被 CORS 限制）";
    }
}

function toggleAutoCheck() {
    const btn = document.getElementById("autoBtn");

    if (interval) {
        clearInterval(interval);
        interval = null;
        btn.innerText = "开启自动查询";
    } else {
        checkPlayers();
        interval = setInterval(checkPlayers, 60000);
        btn.innerText = "关闭自动查询";
    }
}
</script>

</body>
</html>
